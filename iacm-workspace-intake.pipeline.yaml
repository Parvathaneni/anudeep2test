pipeline:
  name: iacm-workspace-intake
  identifier: iacm_workspace_intake
  description: Triggered by Harness IDP. Creates a versioned IaCM workspace request, opens a PR, waits for approval, merges, and verifies workspace creation.
  tags:
    source: idp
    domain: iacm

  variables:
    # Values supplied by Harness IDP.
    - name: organizationId
      type: String
      required: true
      value: <+input>.default(default)
    - name: projectId
      type: String
      required: true
      value: <+input>
    - name: cloud
      type: String
      required: true
      value: <+input>.default(gcp)
    - name: application_id
      type: String
      required: false
      value: <+input>.default("")
    - name: application_name
      type: String
      required: false
      value: <+input>.default("")
    - name: environment_tier
      type: String
      required: true
      value: <+input>
    - name: execution_mode
      type: String
      required: true
      value: <+input>
    - name: primary_owner_id
      type: String
      required: true
      value: <+input>
    - name: secondary_owner_id
      type: String
      required: true
      value: <+input>
    - name: business_criticality
      type: String
      required: true
      value: <+input>
    - name: data_sensitivity_level
      type: String
      required: true
      value: <+input>
    - name: gcp_project_id
      type: String
      required: true
      value: <+input>
    - name: gcp_region
      type: String
      required: true
      value: <+input>
    - name: gcp_folder_id
      type: String
      required: false
      value: <+input>.default("")
    - name: gcp_connector
      type: String
      required: true
      value: <+input>
    - name: iacm_code_repo
      type: String
      required: true
      value: <+input>
    - name: iacm_code_branch
      type: String
      required: true
      value: <+input>.default(main)
    - name: iacm_code_path
      type: String
      required: true
      value: <+input>
    - name: idp_request_json
      type: String
      required: false
      value: <+input>.default("{}")
    - name: triggeredByName
      type: String
      required: false
      value: <+input>.default("")
    - name: triggeredByEmail
      type: String
      required: false
      value: <+input>.default("")

    # Platform-owned values. Keep these out of the IDP form.
    - name: scm_repo_url
      type: String
      required: true
      value: https://github.example.com/YOUR_ORG/YOUR_REPO.git
    - name: scm_api_base_url
      type: String
      required: true
      value: https://github.example.com/api/v3
    - name: scm_org_or_owner
      type: String
      required: true
      value: YOUR_ORG
    - name: scm_repo_name
      type: String
      required: true
      value: YOUR_REPO
    - name: scm_base_branch
      type: String
      required: true
      value: main
    - name: harness_base_url
      type: String
      required: true
      value: https://app.harness.io
    - name: workspace_request_root
      type: String
      required: true
      value: workspace-requests

  stages:
    - stage:
        name: Normalize and Validate
        identifier: normalize_and_validate
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          execution:
            steps:
              - step:
                  name: Normalize Inputs
                  identifier: normalize_inputs
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          for cmd in git jq curl base64; do
                            if ! command -v "$cmd" >/dev/null 2>&1; then
                              echo "ERROR: Required command not found on delegate: $cmd"
                              exit 1
                            fi
                          done

                          ORGANIZATION_ID='<+pipeline.variables.organizationId>'
                          PROJECT_ID='<+pipeline.variables.projectId>'
                          CLOUD_RAW='<+pipeline.variables.cloud>'
                          ENV_TIER_RAW='<+pipeline.variables.environment_tier>'
                          EXECUTION_MODE_RAW='<+pipeline.variables.execution_mode>'
                          PRIMARY_OWNER='<+pipeline.variables.primary_owner_id>'
                          SECONDARY_OWNER='<+pipeline.variables.secondary_owner_id>'
                          BUSINESS_CRITICALITY_RAW='<+pipeline.variables.business_criticality>'
                          DATA_SENSITIVITY_RAW='<+pipeline.variables.data_sensitivity_level>'
                          GCP_PROJECT_ID='<+pipeline.variables.gcp_project_id>'
                          GCP_REGION='<+pipeline.variables.gcp_region>'
                          GCP_CONNECTOR='<+pipeline.variables.gcp_connector>'
                          IACM_CODE_REPO='<+pipeline.variables.iacm_code_repo>'
                          IACM_CODE_BRANCH='<+pipeline.variables.iacm_code_branch>'
                          IACM_CODE_PATH='<+pipeline.variables.iacm_code_path>'

                          normalize_token() {
                            printf '%s' "$1" \
                              | tr '[:upper:]' '[:lower:]' \
                              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/[[:space:]]+/_/g; s/[^a-z0-9._-]+/_/g; s/_+/_/g'
                          }

                          CLOUD="$(normalize_token "$CLOUD_RAW")"
                          if [[ "$CLOUD" != "gcp" ]]; then
                            echo "ERROR: This intake currently supports cloud=gcp only. Got: $CLOUD_RAW"
                            exit 1
                          fi

                          case "$(normalize_token "$ENV_TIER_RAW")" in
                            dev|development)
                              ENVIRONMENT_TIER="dev"
                              WORKSPACE_TEMPLATE="ws-nonprod-auto"
                              PIPELINE_TEMPLATE="iacm_provision_auto"
                              ;;
                            stage|staging)
                              ENVIRONMENT_TIER="staging"
                              WORKSPACE_TEMPLATE="ws-nonprod-approval"
                              PIPELINE_TEMPLATE="iacm_provision_approval"
                              ;;
                            prod|production)
                              ENVIRONMENT_TIER="prod"
                              WORKSPACE_TEMPLATE="ws-prod"
                              PIPELINE_TEMPLATE="iacm_provision_prod"
                              ;;
                            *)
                              echo "ERROR: Invalid environment tier: $ENV_TIER_RAW"
                              exit 1
                              ;;
                          esac

                          case "$(normalize_token "$EXECUTION_MODE_RAW")" in
                            plan|plan_only|plan-only)
                              EXECUTION_MODE="plan_only"
                              ;;
                            plan_manual_apply|plan-manual-apply|manual_apply|manual-apply)
                              EXECUTION_MODE="plan_manual_apply"
                              ;;
                            auto|auto_apply|auto-apply|apply_auto|apply-auto)
                              EXECUTION_MODE="auto_apply"
                              ;;
                            *)
                              echo "ERROR: Invalid execution mode: $EXECUTION_MODE_RAW"
                              exit 1
                              ;;
                          esac

                          if [[ "$ENVIRONMENT_TIER" == "prod" && "$EXECUTION_MODE" == "auto_apply" ]]; then
                            echo "ERROR: Production cannot use auto_apply execution mode"
                            exit 1
                          fi

                          BUSINESS_CRITICALITY="$(normalize_token "$BUSINESS_CRITICALITY_RAW")"
                          case "$BUSINESS_CRITICALITY" in
                            low|medium|high|critical) ;;
                            *)
                              echo "ERROR: Invalid business criticality: $BUSINESS_CRITICALITY_RAW"
                              exit 1
                              ;;
                          esac

                          DATA_SENSITIVITY_LEVEL="$(normalize_token "$DATA_SENSITIVITY_RAW")"
                          case "$DATA_SENSITIVITY_LEVEL" in
                            public|internal|confidential|restricted) ;;
                            *)
                              echo "ERROR: Invalid data sensitivity level: $DATA_SENSITIVITY_RAW"
                              exit 1
                              ;;
                          esac

                          PRIMARY_OWNER_LC="$(normalize_token "$PRIMARY_OWNER")"
                          SECONDARY_OWNER_LC="$(normalize_token "$SECONDARY_OWNER")"
                          if [[ "$PRIMARY_OWNER_LC" == "$SECONDARY_OWNER_LC" ]]; then
                            echo "ERROR: Primary and secondary owner cannot be the same"
                            exit 1
                          fi

                          if [[ ! "$GCP_REGION" =~ ^[a-z]+-[a-z]+[0-9]$ ]]; then
                            echo "ERROR: GCP region does not look valid: $GCP_REGION"
                            exit 1
                          fi

                          if [[ "$IACM_CODE_PATH" == *".."* ]]; then
                            echo "ERROR: IaCM code path cannot contain '..'"
                            exit 1
                          fi

                          PROJECT_SLUG="$(normalize_token "$PROJECT_ID" | sed -E 's/^[^a-z0-9]+//; s/[^a-z0-9]+$//')"
                          if [[ -z "$PROJECT_SLUG" ]]; then
                            echo "ERROR: Project ID did not produce a valid workspace slug"
                            exit 1
                          fi

                          WORKSPACE_NAME="${PROJECT_SLUG}-${ENVIRONMENT_TIER}"
                          REQUEST_ID="iacm-${WORKSPACE_NAME}-<+pipeline.sequenceId>"
                          REQUEST_FILE="<+pipeline.variables.workspace_request_root>/${CLOUD}/${PROJECT_SLUG}/${ENVIRONMENT_TIER}.json"
                          BRANCH_NAME="iacm/${WORKSPACE_NAME}-<+pipeline.sequenceId>"

                          echo "Workspace request normalized:"
                          echo "  request id: ${REQUEST_ID}"
                          echo "  workspace: ${WORKSPACE_NAME}"
                          echo "  tier: ${ENVIRONMENT_TIER}"
                          echo "  execution mode: ${EXECUTION_MODE}"
                          echo "  request file: ${REQUEST_FILE}"

                          PROJECT_ID="$PROJECT_ID"
                    outputVariables:
                      - name: ORGANIZATION_ID
                        type: String
                        value: ORGANIZATION_ID
                      - name: PROJECT_ID
                        type: String
                        value: PROJECT_ID
                      - name: CLOUD
                        type: String
                        value: CLOUD
                      - name: ENVIRONMENT_TIER
                        type: String
                        value: ENVIRONMENT_TIER
                      - name: EXECUTION_MODE
                        type: String
                        value: EXECUTION_MODE
                      - name: WORKSPACE_NAME
                        type: String
                        value: WORKSPACE_NAME
                      - name: WORKSPACE_TEMPLATE
                        type: String
                        value: WORKSPACE_TEMPLATE
                      - name: PIPELINE_TEMPLATE
                        type: String
                        value: PIPELINE_TEMPLATE
                      - name: REQUEST_FILE
                        type: String
                        value: REQUEST_FILE
                      - name: REQUEST_ID
                        type: String
                        value: REQUEST_ID
                      - name: BRANCH_NAME
                        type: String
                        value: BRANCH_NAME
                      - name: BUSINESS_CRITICALITY
                        type: String
                        value: BUSINESS_CRITICALITY
                      - name: DATA_SENSITIVITY_LEVEL
                        type: String
                        value: DATA_SENSITIVITY_LEVEL

              - step:
                  name: Precheck Workspace Does Not Exist
                  identifier: precheck_workspace_does_not_exist
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          WORKSPACE_NAME='<+execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          PROJECT_ID='<+execution.steps.normalize_inputs.output.outputVariables.PROJECT_ID>'
                          ORGANIZATION_ID='<+execution.steps.normalize_inputs.output.outputVariables.ORGANIZATION_ID>'
                          ACCOUNT_ID='<+account.identifier>'
                          HARNESS_BASE_URL='<+pipeline.variables.harness_base_url>'

                          HARNESS_API="${HARNESS_BASE_URL}/gateway/iacm/api/orgs/${ORGANIZATION_ID}/projects/${PROJECT_ID}/workspaces/${WORKSPACE_NAME}"

                          RESPONSE_CODE="$(curl -sS -o /tmp/iacm-workspace-precheck.json -w "%{http_code}" \
                            -H "Harness-Account: ${ACCOUNT_ID}" \
                            -H "x-api-key: ${HARNESS_API_KEY}" \
                            -H "Content-Type: application/json" \
                            "$HARNESS_API")"

                          if [[ "$RESPONSE_CODE" == "200" ]]; then
                            echo "ERROR: Workspace already exists in Harness IaCM: ${WORKSPACE_NAME}"
                            PRECHECK_STATUS="already_exists"
                            exit 1
                          fi

                          if [[ "$RESPONSE_CODE" != "404" ]]; then
                            echo "ERROR: Unable to confirm workspace availability. HTTP ${RESPONSE_CODE}"
                            cat /tmp/iacm-workspace-precheck.json || true
                            PRECHECK_STATUS="precheck_failed"
                            exit 1
                          fi

                          PRECHECK_STATUS="available"
                          echo "Workspace is available: ${WORKSPACE_NAME}"
                          echo "PRECHECK_STATUS=$PRECHECK_STATUS"
                    environmentVariables:
                      - name: HARNESS_API_KEY
                        type: Secret
                        value: harness_platform_api_key
                    outputVariables:
                      - name: PRECHECK_STATUS
                        type: String
                        value: PRECHECK_STATUS

    - stage:
        name: Create Workspace Pull Request
        identifier: create_workspace_pull_request
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          execution:
            steps:
              - step:
                  name: Select Execution Workspace
                  identifier: select_execution_workspace
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          HOST_SELECTOR="$HOSTNAME"
                          WORKDIR="/tmp/iacm-workspace-repo-<+pipeline.sequenceId>"

                          mkdir -p "$WORKDIR"

                          echo "HOST_SELECTOR=$HOST_SELECTOR"
                          echo "WORKDIR=$WORKDIR"
                    outputVariables:
                      - name: HOST_SELECTOR
                        type: String
                        value: HOST_SELECTOR
                      - name: WORKDIR
                        type: String
                        value: WORKDIR

              - step:
                  name: Clone Platform Factory Repo
                  identifier: clone_platform_factory_repo
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    delegateSelectors:
                      - <+execution.steps.select_execution_workspace.output.outputVariables.HOST_SELECTOR>
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          REPO_URL='<+pipeline.variables.scm_repo_url>'
                          BASE_BRANCH='<+pipeline.variables.scm_base_branch>'
                          BRANCH_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.BRANCH_NAME>'

                          rm -rf "$WORKDIR"
                          AUTH_HEADER="$(printf 'x-access-token:%s' "$SCM_TOKEN" | base64 | tr -d '\n')"

                          git -c http.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" clone --branch "$BASE_BRANCH" "$REPO_URL" "$WORKDIR"
                          cd "$WORKDIR"
                          git checkout -b "$BRANCH_NAME"
                          git config user.email "iacm-automation@example.com"
                          git config user.name "Harness IaCM Automation"

                          echo "WORKDIR=$WORKDIR"
                    environmentVariables:
                      - name: WORKDIR
                        type: String
                        value: <+execution.steps.select_execution_workspace.output.outputVariables.WORKDIR>
                      - name: SCM_TOKEN
                        type: Secret
                        value: iacm_scm_pat
                    outputVariables:
                      - name: WORKDIR
                        type: String
                        value: WORKDIR

              - step:
                  name: Write Workspace Request
                  identifier: write_workspace_request
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    delegateSelectors:
                      - <+execution.steps.select_execution_workspace.output.outputVariables.HOST_SELECTOR>
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          cd "$WORKDIR"

                          WORKSPACE_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          REQUEST_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.REQUEST_ID>'
                          REQUEST_FILE='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.REQUEST_FILE>'
                          ORGANIZATION_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.ORGANIZATION_ID>'
                          PROJECT_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.PROJECT_ID>'
                          CLOUD='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.CLOUD>'
                          ENVIRONMENT_TIER='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.ENVIRONMENT_TIER>'
                          EXECUTION_MODE='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.EXECUTION_MODE>'
                          WORKSPACE_TEMPLATE='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_TEMPLATE>'
                          PIPELINE_TEMPLATE='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.PIPELINE_TEMPLATE>'
                          BUSINESS_CRITICALITY='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.BUSINESS_CRITICALITY>'
                          DATA_SENSITIVITY_LEVEL='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.DATA_SENSITIVITY_LEVEL>'

                          GCP_FOLDER_ID='<+pipeline.variables.gcp_folder_id>'
                          APPLICATION_ID='<+pipeline.variables.application_id>'
                          APPLICATION_NAME='<+pipeline.variables.application_name>'
                          REQUESTED_AT_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                          IDP_REQUEST_JSON="${IDP_REQUEST_JSON:-{}}"

                          if [[ -z "$IDP_REQUEST_JSON" || "$IDP_REQUEST_JSON" == "<+input>" || "$IDP_REQUEST_JSON" == "null" ]]; then
                            IDP_REQUEST_JSON="{}"
                          fi

                          if ! echo "$IDP_REQUEST_JSON" | jq -e 'type == "object"' >/dev/null 2>&1; then
                            echo "ERROR: idp_request_json must be a valid JSON object"
                            exit 1
                          fi

                          if [[ -e "$REQUEST_FILE" ]]; then
                            echo "ERROR: Workspace request already exists: $REQUEST_FILE"
                            exit 1
                          fi

                          mkdir -p "$(dirname "$REQUEST_FILE")"

                          jq -n \
                            --arg ws "$WORKSPACE_NAME" \
                            --arg request_id "$REQUEST_ID" \
                            --arg pipeline_sequence_id '<+pipeline.sequenceId>' \
                            --arg requested_at_utc "$REQUESTED_AT_UTC" \
                            --arg organization "$ORGANIZATION_ID" \
                            --arg project "$PROJECT_ID" \
                            --arg cloud "$CLOUD" \
                            --arg workspace_template "$WORKSPACE_TEMPLATE" \
                            --arg pipeline_template "$PIPELINE_TEMPLATE" \
                            --arg environment_tier "$ENVIRONMENT_TIER" \
                            --arg execution_mode "$EXECUTION_MODE" \
                            --arg iacm_code_repo '<+pipeline.variables.iacm_code_repo>' \
                            --arg iacm_code_branch '<+pipeline.variables.iacm_code_branch>' \
                            --arg iacm_code_path '<+pipeline.variables.iacm_code_path>' \
                            --arg opentofu_version "1.8.0" \
                            --arg gcp_project_id '<+pipeline.variables.gcp_project_id>' \
                            --arg gcp_region '<+pipeline.variables.gcp_region>' \
                            --arg gcp_connector '<+pipeline.variables.gcp_connector>' \
                            --arg primary_owner '<+pipeline.variables.primary_owner_id>' \
                            --arg secondary_owner '<+pipeline.variables.secondary_owner_id>' \
                            --arg business_criticality "$BUSINESS_CRITICALITY" \
                            --arg data_sensitivity_level "$DATA_SENSITIVITY_LEVEL" \
                            --arg requested_by_name '<+pipeline.variables.triggeredByName>' \
                            --arg requested_by_email '<+pipeline.variables.triggeredByEmail>' \
                            --arg pipeline_execution_url '<+pipeline.executionUrl>' \
                            --argjson idp_request "$IDP_REQUEST_JSON" \
                            '{
                              ($ws): {
                                schema_version: 1,
                                request_id: $request_id,
                                requested_at_utc: $requested_at_utc,
                                organization: $organization,
                                project: $project,
                                cloud: $cloud,
                                workspace_template: $workspace_template,
                                pipeline_template: $pipeline_template,
                                environment_tier: $environment_tier,
                                execution_mode: $execution_mode,
                                iacm_code_repo: $iacm_code_repo,
                                iacm_code_branch: $iacm_code_branch,
                                iacm_code_path: $iacm_code_path,
                                opentofu_version: $opentofu_version,
                                gcp_project_id: $gcp_project_id,
                                gcp_region: $gcp_region,
                                gcp_connector: $gcp_connector,
                                primary_owner: $primary_owner,
                                secondary_owner: $secondary_owner,
                                business_criticality: $business_criticality,
                                data_sensitivity_level: $data_sensitivity_level,
                                requested_by: {
                                  name: $requested_by_name,
                                  email: $requested_by_email
                                },
                                metadata: (
                                  $idp_request
                                  | del(
                                      .organizationId,
                                      .projectId,
                                      .application_id,
                                      .application_name,
                                      .cloud,
                                      .environment_tier,
                                      .execution_mode,
                                      .primary_owner_id,
                                      .secondary_owner_id,
                                      .business_criticality,
                                      .data_sensitivity_level,
                                      .gcp_project_id,
                                      .gcp_region,
                                      .gcp_folder_id,
                                      .gcp_connector,
                                      .iacm_code_repo,
                                      .iacm_code_branch,
                                      .iacm_code_path
                                    )
                                  | with_entries(select(.value != null and .value != ""))
                                ),
                                source: {
                                  system: "harness-idp",
                                  pipeline_sequence_id: $pipeline_sequence_id,
                                  pipeline_execution_url: $pipeline_execution_url
                                }
                              }
                            }' > "$REQUEST_FILE"

                          if [[ -n "$GCP_FOLDER_ID" && "$GCP_FOLDER_ID" != "<+input>" && "$GCP_FOLDER_ID" != "null" ]]; then
                            tmp_file="$(mktemp)"
                            jq --arg ws "$WORKSPACE_NAME" --arg folder "$GCP_FOLDER_ID" '.[$ws].gcp_folder_id = $folder' "$REQUEST_FILE" > "$tmp_file"
                            mv "$tmp_file" "$REQUEST_FILE"
                          fi

                          if [[ -n "$APPLICATION_ID" && "$APPLICATION_ID" != "<+input>" && "$APPLICATION_ID" != "null" ]]; then
                            tmp_file="$(mktemp)"
                            jq --arg ws "$WORKSPACE_NAME" --arg application_id "$APPLICATION_ID" '.[$ws].application_id = $application_id' "$REQUEST_FILE" > "$tmp_file"
                            mv "$tmp_file" "$REQUEST_FILE"
                          fi

                          if [[ -n "$APPLICATION_NAME" && "$APPLICATION_NAME" != "<+input>" && "$APPLICATION_NAME" != "null" ]]; then
                            tmp_file="$(mktemp)"
                            jq --arg ws "$WORKSPACE_NAME" --arg application_name "$APPLICATION_NAME" '.[$ws].application_name = $application_name' "$REQUEST_FILE" > "$tmp_file"
                            mv "$tmp_file" "$REQUEST_FILE"
                          fi

                          jq empty "$REQUEST_FILE"
                          echo "REQUEST_FILE=$REQUEST_FILE"
                    outputVariables:
                      - name: REQUEST_FILE
                        type: String
                        value: REQUEST_FILE
                    environmentVariables:
                      - name: WORKDIR
                        type: String
                        value: <+execution.steps.select_execution_workspace.output.outputVariables.WORKDIR>
                      - name: IDP_REQUEST_JSON
                        type: String
                        value: <+pipeline.variables.idp_request_json>

              - step:
                  name: Validate Factory Config
                  identifier: validate_factory_config
                  type: ShellScript
                  timeout: 20m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    delegateSelectors:
                      - <+execution.steps.select_execution_workspace.output.outputVariables.HOST_SELECTOR>
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          cd "$WORKDIR"

                          REQUEST_ROOT='<+pipeline.variables.workspace_request_root>'

                          find "$REQUEST_ROOT" -name '*.json' -print0 | xargs -0 -r -n1 jq empty

                          duplicate_workspace_keys="$(find "$REQUEST_ROOT" -name '*.json' -print0 | xargs -0 -r jq -r 'keys[]' | sort | uniq -d || true)"
                          if [[ -n "$duplicate_workspace_keys" ]]; then
                            echo "ERROR: Duplicate workspace keys found across request files:"
                            echo "$duplicate_workspace_keys"
                            exit 1
                          fi

                          missing_tracking_fields="$(find "$REQUEST_ROOT" -name '*.json' -print0 | xargs -0 -r jq -r 'to_entries[] | select(((.value.request_id // "") == "") or ((.value.requested_at_utc // "") == "") or ((.value.source.pipeline_sequence_id // "") == "")) | "\(input_filename):\(.key)"' || true)"
                          if [[ -n "$missing_tracking_fields" ]]; then
                            echo "ERROR: Workspace request files are missing tracking metadata."
                            echo "Each workspace entry must include request_id, requested_at_utc, and source.pipeline_sequence_id."
                            echo "$missing_tracking_fields"
                            exit 1
                          fi

                          while IFS= read -r request_file; do
                            relative_request_path="${request_file#${REQUEST_ROOT}/}"
                            relative_request_path_without_cloud="${relative_request_path#*/}"
                            request_dir="$(dirname "$relative_request_path_without_cloud")"
                            request_name="$(basename "$request_file" .json)"
                            if [[ "$request_dir" == "." ]]; then
                              expected_key="$request_name"
                            else
                              expected_key="$(printf '%s-%s' "$request_dir" "$request_name" | tr '/' '-')"
                            fi
                            actual_key="$(jq -r 'keys[0]' "$request_file")"
                            key_count="$(jq 'keys | length' "$request_file")"

                            if [[ "$key_count" != "1" ]]; then
                              echo "ERROR: Each request file must contain exactly one workspace key: $request_file"
                              exit 1
                            fi

                            if [[ "$actual_key" != "$expected_key" ]]; then
                              echo "ERROR: Workspace key must match filename"
                              echo "File: $request_file"
                              echo "Expected key: $expected_key"
                              echo "Actual key:   $actual_key"
                              exit 1
                            fi
                          done < <(find "$REQUEST_ROOT" -name '*.json' | sort)

                          if command -v tofu >/dev/null 2>&1 && find . -name '*.tf' -print -quit | grep -q .; then
                            tofu fmt -check -recursive
                            tofu init -backend=false
                            tofu validate
                          else
                            echo "OpenTofu not available or no Terraform files found; JSON request validation completed."
                          fi
                    environmentVariables:
                      - name: WORKDIR
                        type: String
                        value: <+execution.steps.select_execution_workspace.output.outputVariables.WORKDIR>

              - step:
                  name: Commit and Push Request
                  identifier: commit_and_push_request
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    delegateSelectors:
                      - <+execution.steps.select_execution_workspace.output.outputVariables.HOST_SELECTOR>
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          REQUEST_FILE='<+execution.steps.write_workspace_request.output.outputVariables.REQUEST_FILE>'
                          BRANCH_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.BRANCH_NAME>'
                          WORKSPACE_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'

                          cd "$WORKDIR"

                          git add "$REQUEST_FILE"
                          git diff --cached --quiet && {
                            echo "ERROR: No workspace request changes were staged"
                            exit 1
                          }

                          git commit -m "feat(iacm): add workspace ${WORKSPACE_NAME}"

                          AUTH_HEADER="$(printf 'x-access-token:%s' "$SCM_TOKEN" | base64 | tr -d '\n')"
                          git -c http.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" push --set-upstream origin "$BRANCH_NAME"

                          HEAD_SHA="$(git rev-parse HEAD)"
                          echo "HEAD_SHA=$HEAD_SHA"
                    environmentVariables:
                      - name: WORKDIR
                        type: String
                        value: <+execution.steps.select_execution_workspace.output.outputVariables.WORKDIR>
                      - name: SCM_TOKEN
                        type: Secret
                        value: iacm_scm_pat
                    outputVariables:
                      - name: HEAD_SHA
                        type: String
                        value: HEAD_SHA

              - step:
                  name: Create Pull Request
                  identifier: create_pull_request
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          SCM_API_BASE_URL='<+pipeline.variables.scm_api_base_url>'
                          SCM_OWNER='<+pipeline.variables.scm_org_or_owner>'
                          SCM_REPO='<+pipeline.variables.scm_repo_name>'
                          BASE_BRANCH='<+pipeline.variables.scm_base_branch>'
                          BRANCH_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.BRANCH_NAME>'
                          WORKSPACE_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          REQUEST_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.REQUEST_ID>'
                          ENVIRONMENT_TIER='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.ENVIRONMENT_TIER>'
                          EXECUTION_MODE='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.EXECUTION_MODE>'
                          REQUEST_FILE='<+execution.steps.write_workspace_request.output.outputVariables.REQUEST_FILE>'

                          PR_BODY="$(cat <<PRBODY
                          IaCM workspace provisioning request

                          Workspace: ${WORKSPACE_NAME}
                          Request ID: ${REQUEST_ID}
                          Environment: ${ENVIRONMENT_TIER}
                          Execution mode: ${EXECUTION_MODE}
                          Request file: ${REQUEST_FILE}
                          Requested by: <+pipeline.variables.triggeredByName> / <+pipeline.variables.triggeredByEmail>

                          This PR was generated by Harness IDP and the IaCM intake backend pipeline.

                          Harness pipeline: <+pipeline.executionUrl>
                          PRBODY
                          )"

                          PAYLOAD="$(jq -n \
                            --arg title "feat(iacm): ${WORKSPACE_NAME} (${ENVIRONMENT_TIER})" \
                            --arg head "$BRANCH_NAME" \
                            --arg base "$BASE_BRANCH" \
                            --arg body "$PR_BODY" \
                            '{title: $title, head: $head, base: $base, body: $body, maintainer_can_modify: true}')"

                          PR_RESPONSE="$(curl -sS -X POST \
                            -H "Authorization: Bearer ${SCM_TOKEN}" \
                            -H "Accept: application/vnd.github+json" \
                            "${SCM_API_BASE_URL}/repos/${SCM_OWNER}/${SCM_REPO}/pulls" \
                            -d "$PAYLOAD")"

                          PR_URL="$(echo "$PR_RESPONSE" | jq -r '.html_url // empty' 2>/dev/null || true)"
                          PR_NUMBER="$(echo "$PR_RESPONSE" | jq -r '.number // empty' 2>/dev/null || true)"
                          PR_HEAD_SHA="$(echo "$PR_RESPONSE" | jq -r '.head.sha // empty' 2>/dev/null || true)"

                          if [[ -z "$PR_URL" || -z "$PR_NUMBER" || "$PR_URL" == "null" ]]; then
                            echo "ERROR: Failed to create pull request"
                            echo "$PR_RESPONSE"
                            exit 1
                          fi

                          echo "PR_URL=$PR_URL"
                          echo "PR_NUMBER=$PR_NUMBER"
                          echo "PR_HEAD_SHA=$PR_HEAD_SHA"
                    environmentVariables:
                      - name: SCM_TOKEN
                        type: Secret
                        value: iacm_scm_pat
                    outputVariables:
                      - name: PR_URL
                        type: String
                        value: PR_URL
                      - name: PR_NUMBER
                        type: String
                        value: PR_NUMBER
                      - name: PR_HEAD_SHA
                        type: String
                        value: PR_HEAD_SHA

              - step:
                  name: Cleanup PR Workspace
                  identifier: cleanup_pr_workspace
                  type: ShellScript
                  when:
                    stageStatus: All
                  timeout: 5m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    delegateSelectors:
                      - <+execution.steps.select_execution_workspace.output.outputVariables.HOST_SELECTOR>
                    source:
                      type: Inline
                      spec:
                        script: |
                          rm -rf "$WORKDIR"
                          echo "Cleaned up PR workspace: $WORKDIR"
                    environmentVariables:
                      - name: WORKDIR
                        type: String
                        value: <+execution.steps.select_execution_workspace.output.outputVariables.WORKDIR>

    - stage:
        name: Platform Approval
        identifier: platform_approval
        type: Approval
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          execution:
            steps:
              - step:
                  name: Review Workspace Request
                  identifier: review_workspace_request
                  type: HarnessApproval
                  timeout: 7d
                  spec:
                    approvalMessage: |
                      IaCM Workspace Provisioning Request

                      Workspace: <+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>
                      Project: <+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.PROJECT_ID>
                      Request ID: <+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.REQUEST_ID>
                      Environment: <+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.ENVIRONMENT_TIER>
                      Execution mode: <+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.EXECUTION_MODE>
                      Pull request: <+pipeline.stages.create_workspace_pull_request.spec.execution.steps.create_pull_request.output.outputVariables.PR_URL>
                      Requested by: <+pipeline.variables.triggeredByName> / <+pipeline.variables.triggeredByEmail>

                      Approve only after the PR diff and repository checks are acceptable.
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account.YOUR_IACM_APPROVER_GROUP
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []

    - stage:
        name: Merge and Verify
        identifier: merge_and_verify
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          execution:
            steps:
              - step:
                  name: Refresh Pull Request State
                  identifier: refresh_pull_request_state
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          SCM_API_BASE_URL='<+pipeline.variables.scm_api_base_url>'
                          SCM_OWNER='<+pipeline.variables.scm_org_or_owner>'
                          SCM_REPO='<+pipeline.variables.scm_repo_name>'
                          PR_NUMBER='<+pipeline.stages.create_workspace_pull_request.spec.execution.steps.create_pull_request.output.outputVariables.PR_NUMBER>'
                          EXPECTED_HEAD_SHA='<+pipeline.stages.create_workspace_pull_request.spec.execution.steps.create_pull_request.output.outputVariables.PR_HEAD_SHA>'

                          PR_RESPONSE="$(curl -sS \
                            -H "Authorization: Bearer ${SCM_TOKEN}" \
                            -H "Accept: application/vnd.github+json" \
                            "${SCM_API_BASE_URL}/repos/${SCM_OWNER}/${SCM_REPO}/pulls/${PR_NUMBER}")"

                          PR_STATE="$(echo "$PR_RESPONSE" | jq -r '.state // empty' 2>/dev/null || true)"
                          PR_DRAFT="$(echo "$PR_RESPONSE" | jq -r '.draft // false' 2>/dev/null || true)"
                          CURRENT_HEAD_SHA="$(echo "$PR_RESPONSE" | jq -r '.head.sha // empty' 2>/dev/null || true)"

                          if [[ "$PR_STATE" != "open" ]]; then
                            echo "ERROR: Pull request is not open. State: $PR_STATE"
                            exit 1
                          fi

                          if [[ "$PR_DRAFT" == "true" ]]; then
                            echo "ERROR: Pull request is still marked draft"
                            exit 1
                          fi

                          if [[ "$CURRENT_HEAD_SHA" != "$EXPECTED_HEAD_SHA" ]]; then
                            echo "ERROR: Pull request head SHA changed after approval"
                            echo "Expected: $EXPECTED_HEAD_SHA"
                            echo "Current:  $CURRENT_HEAD_SHA"
                            exit 1
                          fi

                          echo "CURRENT_HEAD_SHA=$CURRENT_HEAD_SHA"
                    environmentVariables:
                      - name: SCM_TOKEN
                        type: Secret
                        value: iacm_scm_pat
                    outputVariables:
                      - name: CURRENT_HEAD_SHA
                        type: String
                        value: CURRENT_HEAD_SHA

              - step:
                  name: Merge Pull Request
                  identifier: merge_pull_request
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          SCM_API_BASE_URL='<+pipeline.variables.scm_api_base_url>'
                          SCM_OWNER='<+pipeline.variables.scm_org_or_owner>'
                          SCM_REPO='<+pipeline.variables.scm_repo_name>'
                          PR_NUMBER='<+pipeline.stages.create_workspace_pull_request.spec.execution.steps.create_pull_request.output.outputVariables.PR_NUMBER>'
                          WORKSPACE_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          CURRENT_HEAD_SHA='<+execution.steps.refresh_pull_request_state.output.outputVariables.CURRENT_HEAD_SHA>'

                          MERGE_PAYLOAD="$(jq -n \
                            --arg sha "$CURRENT_HEAD_SHA" \
                            --arg title "feat(iacm): provision workspace ${WORKSPACE_NAME}" \
                            --arg message "Merged by Harness IaCM intake pipeline after platform approval." \
                            '{sha: $sha, commit_title: $title, commit_message: $message, merge_method: "squash"}')"

                          MERGE_RESPONSE="$(curl -sS -X PUT \
                            -H "Authorization: Bearer ${SCM_TOKEN}" \
                            -H "Accept: application/vnd.github+json" \
                            "${SCM_API_BASE_URL}/repos/${SCM_OWNER}/${SCM_REPO}/pulls/${PR_NUMBER}/merge" \
                            -d "$MERGE_PAYLOAD")"

                          MERGED="$(echo "$MERGE_RESPONSE" | jq -r '.merged // false' 2>/dev/null || true)"
                          MERGE_SHA="$(echo "$MERGE_RESPONSE" | jq -r '.sha // empty' 2>/dev/null || true)"

                          if [[ "$MERGED" != "true" ]]; then
                            echo "ERROR: Failed to merge pull request"
                            echo "$MERGE_RESPONSE"
                            exit 1
                          fi

                          echo "MERGE_SHA=$MERGE_SHA"
                    environmentVariables:
                      - name: SCM_TOKEN
                        type: Secret
                        value: iacm_scm_pat
                    outputVariables:
                      - name: MERGE_SHA
                        type: String
                        value: MERGE_SHA

              - step:
                  name: Confirm Workspace Created
                  identifier: verify_workspace_exists
                  type: ShellScript
                  timeout: 20m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          WORKSPACE_NAME='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          PROJECT_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.PROJECT_ID>'
                          ORGANIZATION_ID='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.ORGANIZATION_ID>'
                          ACCOUNT_ID='<+account.identifier>'
                          HARNESS_BASE_URL='<+pipeline.variables.harness_base_url>'

                          HARNESS_API="${HARNESS_BASE_URL}/gateway/iacm/api/orgs/${ORGANIZATION_ID}/projects/${PROJECT_ID}/workspaces/${WORKSPACE_NAME}"

                          MAX_ATTEMPTS=15
                          POLL_INTERVAL=60
                          ATTEMPT=1
                          WORKSPACE_STATUS="not_found"
                          WORKSPACE_URL=""

                          while [[ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]]; do
                            RESPONSE_CODE="$(curl -sS -o /tmp/iacm-workspace-response.json -w "%{http_code}" \
                              -H "Harness-Account: ${ACCOUNT_ID}" \
                              -H "x-api-key: ${HARNESS_API_KEY}" \
                              -H "Content-Type: application/json" \
                              "$HARNESS_API")"

                            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: HTTP ${RESPONSE_CODE}"

                            if [[ "$RESPONSE_CODE" == "200" ]]; then
                              WORKSPACE_STATUS="created"
                              WORKSPACE_URL="${HARNESS_BASE_URL}/ng/account/${ACCOUNT_ID}/module/iacm/orgs/${ORGANIZATION_ID}/projects/${PROJECT_ID}/workspaces/${WORKSPACE_NAME}"
                              break
                            fi

                            sleep "$POLL_INTERVAL"
                            ATTEMPT=$((ATTEMPT + 1))
                          done

                          if [[ "$WORKSPACE_STATUS" != "created" ]]; then
                            echo "ERROR: Workspace was not found after merge"
                            cat /tmp/iacm-workspace-response.json || true
                            exit 1
                          fi

                          echo "WORKSPACE_URL=$WORKSPACE_URL"
                          echo "WORKSPACE_STATUS=$WORKSPACE_STATUS"
                    environmentVariables:
                      - name: HARNESS_API_KEY
                        type: Secret
                        value: harness_platform_api_key
                    outputVariables:
                      - name: WORKSPACE_URL
                        type: String
                        value: WORKSPACE_URL
                      - name: WORKSPACE_STATUS
                        type: String
                        value: WORKSPACE_STATUS

              - step:
                  name: Export Final Outputs
                  identifier: export_final_outputs
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          PipelineUrl='<+pipeline.executionUrl>'
                          PullRequestUrl='<+pipeline.stages.create_workspace_pull_request.spec.execution.steps.create_pull_request.output.outputVariables.PR_URL>'
                          WorkspaceUrl='<+execution.steps.verify_workspace_exists.output.outputVariables.WORKSPACE_URL>'
                          WorkspaceStatus='<+execution.steps.verify_workspace_exists.output.outputVariables.WORKSPACE_STATUS>'
                          WorkspaceName='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.WORKSPACE_NAME>'
                          RequestId='<+pipeline.stages.normalize_and_validate.spec.execution.steps.normalize_inputs.output.outputVariables.REQUEST_ID>'
                          MergeSha='<+execution.steps.merge_pull_request.output.outputVariables.MERGE_SHA>'

                          echo "PipelineUrl=$PipelineUrl"
                          echo "PullRequestUrl=$PullRequestUrl"
                          echo "WorkspaceUrl=$WorkspaceUrl"
                          echo "WorkspaceStatus=$WorkspaceStatus"
                          echo "WorkspaceName=$WorkspaceName"
                          echo "RequestId=$RequestId"
                          echo "MergeSha=$MergeSha"
                    outputVariables:
                      - name: PipelineUrl
                        type: String
                        value: PipelineUrl
                      - name: PullRequestUrl
                        type: String
                        value: PullRequestUrl
                      - name: WorkspaceUrl
                        type: String
                        value: WorkspaceUrl
                      - name: WorkspaceStatus
                        type: String
                        value: WorkspaceStatus
                      - name: WorkspaceName
                        type: String
                        value: WorkspaceName
                      - name: RequestId
                        type: String
                        value: RequestId
                      - name: MergeSha
                        type: String
                        value: MergeSha

    - stage:
        name: Cleanup
        identifier: cleanup
        type: Custom
        when:
          pipelineStatus: All
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Ignore
        spec:
          execution:
            steps:
              - step:
                  name: Cleanup Delegate Workspace
                  identifier: cleanup_delegate_workspace
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          rm -rf "/tmp/iacm-workspace-repo-<+pipeline.sequenceId>"
                          echo "Cleanup completed"
