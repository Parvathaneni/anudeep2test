pipeline:
  name: iacm-workspace-intake
  identifier: iacm_workspace_intake
  description: Triggered by Harness IDP. Creates a versioned IaCM workspace request, opens a PR, waits for approval, merges, and verifies workspace creation.
  tags:
    source: idp
    domain: iacm

  variables:
    # Values supplied by Harness IDP.
    - name: organizationId
      type: String
      required: true
      value: <+input>.default(default)
    - name: projectId
      type: String
      required: true
      value: <+input>
    - name: cloud
      type: String
      required: true
      value: <+input>.default(gcp)
    - name: application_id
      type: String
      required: false
      value: <+input>.default("")
    - name: application_name
      type: String
      required: false
      value: <+input>.default("")
    - name: environment_tier
      type: String
      required: true
      value: <+input>
    - name: execution_mode
      type: String
      required: true
      value: <+input>
    - name: primary_owner_id
      type: String
      required: true
      value: <+input>
    - name: secondary_owner_id
      type: String
      required: true
      value: <+input>
    - name: business_criticality
      type: String
      required: true
      value: <+input>
    - name: data_sensitivity_level
      type: String
      required: true
      value: <+input>
    - name: gcp_project_id
      type: String
      required: true
      value: <+input>
    - name: gcp_region
      type: String
      required: true
      value: <+input>
    - name: gcp_folder_id
      type: String
      required: false
      value: <+input>.default("")
    - name: gcp_connector
      type: String
      required: true
      value: <+input>
    - name: iacm_code_repo
      type: String
      required: true
      value: <+input>
    - name: iacm_code_branch
      type: String
      required: true
      value: <+input>.default(main)
    - name: iacm_code_path
      type: String
      required: true
      value: <+input>
    - name: idp_request_json
      type: String
      required: false
      value: <+input>.default("{}")
    - name: triggeredByName
      type: String
      required: false
      value: <+input>.default("")
    - name: triggeredByEmail
      type: String
      required: false
      value: <+input>.default("")

    # Platform-owned values. Keep these out of the IDP form.
    - name: scm_repo_url
      type: String
      required: true
      value: https://github.example.com/YOUR_ORG/YOUR_REPO.git
    - name: scm_api_base_url
      type: String
      required: true
      value: https://github.example.com/api/v3
    - name: scm_org_or_owner
      type: String
      required: true
      value: YOUR_ORG
    - name: scm_repo_name
      type: String
      required: true
      value: YOUR_REPO
    - name: scm_base_branch
      type: String
      required: true
      value: main
    - name: harness_base_url
      type: String
      required: true
      value: https://app.harness.io
    - name: workspace_request_root
      type: String
      required: true
      value: workspace-requests

  stages:
    - stage:
        name: Normalize and Validate
        identifier: normalize_and_validate
        type: Custom
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          execution:
            steps:
              - step:
                  name: Normalize Inputs
                  identifier: normalize_inputs
                  type: ShellScript
                  timeout: 10m
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -euo pipefail

                          for cmd in sed tr; do
                            if ! command -v "$cmd" >/dev/null 2>&1; then
                              echo "ERROR: Required command not found on delegate: $cmd"
                              exit 1
                            fi
                          done

                          ORGANIZATION_ID='<+pipeline.variables.organizationId>'
                          PROJECT_ID='<+pipeline.variables.projectId>'
                          CLOUD_RAW='<+pipeline.variables.cloud>'
                          ENV_TIER_RAW='<+pipeline.variables.environment_tier>'
                          EXECUTION_MODE_RAW='<+pipeline.variables.execution_mode>'
                          PRIMARY_OWNER='<+pipeline.variables.primary_owner_id>'
                          SECONDARY_OWNER='<+pipeline.variables.secondary_owner_id>'
                          BUSINESS_CRITICALITY_RAW='<+pipeline.variables.business_criticality>'
                          DATA_SENSITIVITY_RAW='<+pipeline.variables.data_sensitivity_level>'
                          GCP_PROJECT_ID='<+pipeline.variables.gcp_project_id>'
                          GCP_REGION='<+pipeline.variables.gcp_region>'
                          GCP_CONNECTOR='<+pipeline.variables.gcp_connector>'
                          IACM_CODE_REPO='<+pipeline.variables.iacm_code_repo>'
                          IACM_CODE_BRANCH='<+pipeline.variables.iacm_code_branch>'
                          IACM_CODE_PATH='<+pipeline.variables.iacm_code_path>'

                          normalize_token() {
                            printf '%s' "$1" \
                              | tr '[:upper:]' '[:lower:]' \
                              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/[[:space:]]+/_/g; s/[^a-z0-9._-]+/_/g; s/_+/_/g'
                          }

                          CLOUD="$(normalize_token "$CLOUD_RAW")"
                          if [[ "$CLOUD" != "gcp" ]]; then
                            echo "ERROR: This intake currently supports cloud=gcp only. Got: $CLOUD_RAW"
                            exit 1
                          fi

                          case "$(normalize_token "$ENV_TIER_RAW")" in
                            dev|development)
                              ENVIRONMENT_TIER="dev"
                              WORKSPACE_TEMPLATE="ws-nonprod-auto"
                              PIPELINE_TEMPLATE="iacm_provision_auto"
                              ;;
                            stage|staging)
                              ENVIRONMENT_TIER="staging"
                              WORKSPACE_TEMPLATE="ws-nonprod-approval"
                              PIPELINE_TEMPLATE="iacm_provision_approval"
                              ;;
                            prod|production)
                              ENVIRONMENT_TIER="prod"
                              WORKSPACE_TEMPLATE="ws-prod"
                              PIPELINE_TEMPLATE="iacm_provision_prod"
                              ;;
                            *)
                              echo "ERROR: Invalid environment tier: $ENV_TIER_RAW"
                              exit 1
                              ;;
                          esac

                          case "$(normalize_token "$EXECUTION_MODE_RAW")" in
                            plan|plan_only|plan-only)
                              EXECUTION_MODE="plan_only"
                              ;;
                            plan_manual_apply|plan-manual-apply|manual_apply|manual-apply)
                              EXECUTION_MODE="plan_manual_apply"
                              ;;
                            auto|auto_apply|auto-apply|apply_auto|apply-auto)
                              EXECUTION_MODE="auto_apply"
                              ;;
                            *)
                              echo "ERROR: Invalid execution mode: $EXECUTION_MODE_RAW"
                              exit 1
                              ;;
                          esac

                          if [[ "$ENVIRONMENT_TIER" == "prod" && "$EXECUTION_MODE" == "auto_apply" ]]; then
                            echo "ERROR: Production cannot use auto_apply execution mode"
                            exit 1
                          fi

                          BUSINESS_CRITICALITY="$(normalize_token "$BUSINESS_CRITICALITY_RAW")"
                          case "$BUSINESS_CRITICALITY" in
                            low|medium|high|critical) ;;
                            *)
                              echo "ERROR: Invalid business criticality: $BUSINESS_CRITICALITY_RAW"
                              exit 1
                              ;;
                          esac

                          DATA_SENSITIVITY_LEVEL="$(normalize_token "$DATA_SENSITIVITY_RAW")"
                          case "$DATA_SENSITIVITY_LEVEL" in
                            public|internal|confidential|restricted) ;;
                            *)
                              echo "ERROR: Invalid data sensitivity level: $DATA_SENSITIVITY_RAW"
                              exit 1
                              ;;
                          esac

                          PRIMARY_OWNER_LC="$(normalize_token "$PRIMARY_OWNER")"
